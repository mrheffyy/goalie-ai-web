# GoalieAI - Docker Compose for Full Stack Prototype

version: '3.8'

services:
  # Frontend + API (Next.js)
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    volumes:
      - ../..:/app
      - /app/node_modules
    command: npm run dev
    working_dir: /app

  # Python Analyzer (runs on demand via API)
  analyzer:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.analyzer
    volumes:
      - video-data:/data
      - /tmp:/tmp

  # Optional: MinIO for file storage (production)
  storage:
    image: minio/minio
    ports:
      - "9000:9000"
    environment:
      MINIO_ROOT_USER: goalieai
      MINIO_ROOT_PASSWORD: goalieai123
    command: server /data
    volumes:
      - minio-data:/data

volumes:
  video-data:
  minio-data: